<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Torre de Hanoi</title>
    </head>
    <body>
        <div id="cabecalho">
            <label style="font-size: 20px">Inicio: </label>
            <input id="inicio" style="font-size: 20px" placeholder="posição inicial" value="1:2:3:4:5|0|0|">
            <select id="selectinicio" onChange="insert('inicio')">
                <option>1:2:3:4:5|0|0|</option>
                <option>0|0|1:2:3:4:5|</option>
                <option>2|1:3:5|4|</option>
                <option>2|1:3:4|5|</option>
                <option>0|2:3:4|1:5|<option>
            </select>
            <br>
            <label style="font-size: 20px">Fim: </label>
            <input id="fim" style="font-size: 20px" placeholder="posição final" value="0|0|1:2:3:4:5|">
            <select id="selectfim" onChange="insert('fim')">
                <option >0|0|1:2:3:4:5|</option>
                <option>1:2:3:4:5|0|0|</option>
                <option>2|1:3:5|4|</option>
                <option>2|1:3:4|5|</option>
            </select>
            <br>
            <h4 id="sequencia"></h4>
            <br>
            <button type="button" onclick="montarTorre()">Montar Torre</button>
            <button type="button" onclick="iniciar()">Iniciar</button>
            <button type="button" onclick="teste1()">Teste 1</button>
        </div>
        <canvas id="areaDesenho" width="960" height="540" style="border: 3px solid black">

        </canvas>
    </body>
    <script src="base.js"></script>
    <script src="haste.js"></script>
    <script src="disco.js"></script>
    <script src="torre.js"></script>
    <script src="teste.js"></script>
    <script src="./algoritimo/posicaoTorre.js"></script>
    <script src="./algoritimo/game.js"></script>
    <script src="./algoritimo/algoritimo.js"></script>
    <script src="./algoritimo/posicao.js"></script>
    <script src="./algoritimo/no.js"></script>
    <script src="./algoritimo/grafo.js"></script>
    <script src="controller.js" onload="montarTorre()"></script>
</html>
